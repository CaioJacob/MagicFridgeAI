spring.application.name=MagicFridgeAI

# ===============================
# H2 DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:h2:mem:magicfridge_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 console in the browser so you can view the data (optional, but recommended)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# We disable Hibernate's ddl-auto because Flyway will be responsible for creating/altering tables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ===============================
# FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# (Optional) Clean the database every time the app starts to facilitate development:
# spring.flyway.clean-disabled=false