<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicFridge AI 🧊✨</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="dashboard-container">

    <header class="header-glass">
        <h1>MagicFridge <span>AI</span></h1>
        <p>Your smart fridge powered by Artificial Intelligence</p>
    </header>

    <div style="display: flex; flex-direction: column; gap: 2rem; width: 100%;">

        <section class="inventory-section glass-panel" style="width: 100%;">
            <h2>What's in the fridge?</h2>

            <form id="food-form">
                <input type="text" id="food-name" placeholder="E.g., Tomato" required>
                <input type="text" id="food-category" placeholder="Category (e.g., Vegetable)" required>
                <input type="number" id="food-qty" placeholder="Qty" required min="1">
                <input type="date" id="food-expiry" required>
                <button type="submit" class="btn-primary">Save to Fridge</button>
            </form>

            <ul id="food-list" class="food-list">
                <li class="empty-message">Your fridge is empty...</li>
            </ul>
        </section>

        <section class="ai-section glass-panel" style="width: 100%;">
            <div class="ai-header">
                <h2>AI Chef's Suggestion 👨‍🍳</h2>
                <button id="btn-generate" class="btn-magic">✨ Generate Magic Recipe</button>
            </div>

            <div class="recipe-container">
                <div id="recipe-content" class="recipe-content">
                    Click the button above and I will invent a dish using the ingredients you have!
                </div>
            </div>
        </section>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
